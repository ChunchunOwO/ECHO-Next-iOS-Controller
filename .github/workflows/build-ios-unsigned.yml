name: Build iOS unsigned IPA

on:
  workflow_dispatch:
  push:
    paths:
      - "app.json"
      - "App.tsx"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - "src/**"
      - "tsconfig.json"
      - ".github/workflows/build-ios-unsigned.yml"

jobs:
  build:
    name: Build unsigned IPA for sideloading
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: |
          sudo xcode-select --switch /Applications/Xcode_16.5.app/Contents/Developer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build unsigned IPA
        run: bash scripts/build-unsigned-ipa-for-sideloadly.sh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ECHO-iPhone-unsigned-ipa
          path: build/ios-unsigned/ECHO-iPhone-unsigned.ipa
          if-no-files-found: error
